<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enciclopedia Marina Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // --- CONFIGURACIÓN DE FIREBASE ---
        // Debes reemplazar estos valores con los que te da Firebase al crear el proyecto
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO_ID",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_ID",
            appId: "TU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- LÓGICA DE DATOS ---
        window.saveAdminToCloud = async (newData) => {
            try {
                await setDoc(doc(db, "config", "appSettings"), newData);
                console.log("Configuración guardada en la nube");
            } catch (e) {
                console.error("Error guardando en la nube:", e);
            }
        };

        window.loadAdminFromCloud = async () => {
            const docRef = doc(db, "config", "appSettings");
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) return docSnap.data();
            return null;
        };
    </script>
    <style>
        .marine-gradient { background: linear-gradient(180deg, #0f172a 0%, #1e3a8a 100%); }
        .card-glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="marine-gradient min-h-screen text-white p-4">

    <header class="max-w-6xl mx-auto mb-12 flex justify-between items-center">
        <div>
            <h1 class="text-4xl font-bold text-blue-300">Enciclopedia Marina</h1>
            <p id="subtitulo" class="text-blue-100 italic">"Ciencia para <span id="nombre-alumna">María Antonieta</span>"</p>
        </div>
        <button onclick="openAdmin()" class="bg-blue-600 px-4 py-2 rounded-lg hover:bg-blue-500 transition">Admin</button>
    </header>

    <main id="app" class="max-w-6xl mx-auto">
        <div class="card-glass p-8 rounded-2xl text-center">
            <h2 class="text-2xl mb-4">Bienvenida al modo profesional</h2>
            <p>El sistema está configurado para sincronizarse con Firebase.</p>
        </div>
    </main>

    <!-- Modal Admin -->
    <div id="admin-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
        <div class="card-glass p-8 rounded-2xl w-full max-w-md">
            <h2 class="text-2xl mb-4">Configuración de la Nube</h2>
            <input type="password" id="admin-pass" placeholder="Clave" class="w-full p-2 mb-4 text-black rounded">
            <button onclick="guardarFirebase()" class="w-full bg-green-600 p-2 rounded">Sincronizar con Firebase</button>
        </div>
    </div>

    <script>
        // Lógica simplificada de transición
        function openAdmin() { document.getElementById('admin-modal').classList.remove('hidden'); }
        
        async function guardarFirebase() {
            const pass = document.getElementById('admin-pass').value;
            if(pass === "maria2012") {
                // Aquí llamarías a window.saveAdminToCloud
                alert("Conectando a Firebase...");
            } else {
                alert("Clave incorrecta");
            }
        }
    </script>
</body>
</html>
